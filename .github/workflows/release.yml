name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/UpBar \
            .build/x86_64-apple-macosx/release/UpBar \
            -output UpBar-universal

      - name: Create .app bundle
        run: |
          mkdir -p UpBar.app/Contents/MacOS
          cp UpBar-universal UpBar.app/Contents/MacOS/UpBar
          cp Sources/Resources/Info.plist UpBar.app/Contents/
          echo -n "APPL????" > UpBar.app/Contents/PkgInfo

      - name: Create zip
        run: zip -r UpBar.zip UpBar.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: UpBar.zip
          generate_release_notes: true
