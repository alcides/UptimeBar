name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/UptimeBar \
            .build/x86_64-apple-macosx/release/UptimeBar \
            -output UptimeBar-universal

      - name: Create .app bundle
        run: |
          mkdir -p UptimeBar.app/Contents/MacOS
          cp UptimeBar-universal UptimeBar.app/Contents/MacOS/UptimeBar
          cp Sources/Resources/Info.plist UptimeBar.app/Contents/
          echo -n "APPL????" > UptimeBar.app/Contents/PkgInfo

      - name: Create zip
        run: zip -r UptimeBar.zip UptimeBar.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: UptimeBar.zip
          generate_release_notes: true
